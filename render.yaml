databases:
  - name: flora-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: flora-backend
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: DB_SSL
        value: "true"
      - key: CORS_ORIGIN
        value: https://vorobiov-vladyslav.github.io
      - key: DATABASE_URL
        fromDatabase:
          name: flora-db
          property: connectionString
